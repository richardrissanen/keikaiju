<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Keikaiju.com - Coming Soon</title>
<meta name="description" content="Keikaiju exists to bring kei car enthusiasts together. Coming soon.">
<style>
:root{
  --ink:#0a0a0c;
  --mauve:#cdb9c2;
  --yellow:#fed12c;
  --red:#d8231c;
  --paper:#f4f1ea;
}
*{box-sizing:border-box;margin:0;padding:0}
body,html{height:100%}
body{
  font-family:Georgia,'Times New Roman',serif;
  color:var(--paper);
  background:var(--ink)
    url('https://i.pinimg.com/originals/ab/69/c8/ab69c8dd62a2dfe5f9453901c73d2724.jpg')
    center 60%/cover no-repeat;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
body::before{
  content:"";
  position:fixed;inset:0;
  background:linear-gradient(160deg,rgba(10,10,12,.72) 40%,rgba(10,10,12,.88));
}
main{
  position:relative;
  text-align:center;
  padding:2rem 1.5rem;
  max-width:600px;
  width:100%;
}
h1{
  font-family:Impact,'Arial Narrow Bold','Arial Black',sans-serif;
  text-transform:uppercase;
  letter-spacing:.06em;
  font-size:clamp(3rem,12vw,6.5rem);
  line-height:1;
  color:var(--paper);
  text-shadow:0 0 32px var(--red);
}
h1 span{color:var(--yellow)}
.kicker{
  font-family:Impact,'Arial Narrow Bold','Arial Black',sans-serif;
  text-transform:uppercase;
  letter-spacing:.2em;
  font-size:clamp(.7rem,2vw,.95rem);
  color:var(--red);
  margin-bottom:1rem;
}
p{
  color:var(--mauve);
  font-size:clamp(1rem,2.5vw,1.15rem);
  line-height:1.6;
  max-width:44ch;
  margin:1.4rem auto 2rem;
}
form{
  display:flex;
  flex-wrap:wrap;
  gap:.75rem;
  justify-content:center;
}
input[type=email]{
  flex:1 1 220px;
  padding:.8rem 1rem;
  border:2px solid var(--mauve);
  border-radius:2px;
  background:rgba(244,241,234,.1);
  color:var(--paper);
  font-family:Georgia,serif;
  font-size:1rem;
}
input[type=email]::placeholder{color:var(--mauve)}
button{
  flex:0 0 auto;
  background:var(--yellow);
  color:var(--ink);
  border:none;
  padding:.8rem 1.6rem;
  font-family:Impact,'Arial Narrow Bold','Arial Black',sans-serif;
  text-transform:uppercase;
  letter-spacing:.05em;
  font-size:1rem;
  border-radius:2px;
  cursor:pointer;
}
button:hover{background:var(--red);color:var(--paper)}
footer{
  margin-top:2.5rem;
  font-size:.8rem;
  color:var(--mauve);
  opacity:.5;
}
</style>
</head>
<body>
<main>
  <p class="kicker">Coming Soon</p>
  <h1>Keikaiju</h1>
  <p>Keikaiju is a car club that brings kei car enthusiasts together. We organize drive-ins, attend meets, and help each other keep these little strange beasts on the road.</p>
  <form action="#" method="get">
    <input type="email" name="email" placeholder="your@email.com" required aria-label="Email address">
    <button type="submit">Notify me</button>
  </form>
  <footer>keikaiju.com</footer>
</main>
</body>
</html>
